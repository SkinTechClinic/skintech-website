<style>
  :root { --serif: 'Cormorant Garamond', serif; --sans: 'Inter', sans-serif; --ink: #1A1714; --cream: #F5F0EB; --bronze: #6E6359; --bronze-deep: #4A423A; --bronze-pale: #B5AA9D; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
  .logo { margin-bottom: 48px; }
  .logo img { height: 40px; }
  h1 { font-family: var(--serif); font-size: 72px; font-weight: 300; color: var(--bronze); margin-bottom: 16px; line-height: 1; }
  h2 { font-family: var(--serif); font-size: 28px; font-weight: 400; margin-bottom: 12px; font-style: italic; }
  p { color: var(--bronze); font-size: 15px; line-height: 1.7; max-width: 420px; margin: 0 auto 32px; }
  .btn { display: inline-block; padding: 14px 32px; border: 1px solid var(--bronze); border-radius: 999px; font-size: 13px; letter-spacing: 0.08em; text-decoration: none; color: var(--ink); transition: all 0.3s; }
  .btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .links { margin-top: 24px; font-size: 13px; color: var(--bronze-pale); }
  .links a { color: var(--bronze); text-decoration: none; margin: 0 12px; }
  .links a:hover { text-decoration: underline; }
</style>
